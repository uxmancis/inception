services:

  mariadb: # Our DB server
    build: ./mariadb #Dockerfile path: build image from your Dockerfile which is here
    container_name: mariadb
    env_file: .env
    restart: always
    volumes: #Where DB stores data
      - /home/uxmancis/data/mariadb:/var/lib/mysql
    networks: # Allows communication with WordPress
      - inception_network

  wordpress: # Our Application
    build: ./wordpress
    container_name: wordpress
    env_file: .env
    depends_on: #mariadb will start first
      - mariadb
    restart: always
    volumes:
      - /home/uxmancis/data/wordpress:/var/www/html
    networks:
      - inception_network

  nginx:
    build: ./nginx
    container_name: nginx
    depends_on: #wordpress will start first
      - wordpress 
    restart: always
    ports:
      - "443:443" #HTTPS, entrypoint from the internet
    volumes:
      - /home/uxmancis/data/wordpress:/var/www/html
    networks:
      - inception_network

networks:
  inception_network: #private network for containers to talk with each other
